# one service, one port, no drama pyon.
# binds to 127.0.0.1 by default - assumes a reverse proxy (caddy / nginx /
# traefik / whatever) sits in front and forwards to it. if you actually
# want this exposed on the host, swap to "3000:3000".

services:
  pyon:
    build: .
    image: pyon:latest
    container_name: pyon
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PYON_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # 公開する前に PYON_KEY を実際の値にして bot 側にも同じやつ仕込む pyon.
      # 空のままだと auth が無効でwarning吐く. dev中は空でOK
      PYON_KEY: ${PYON_KEY:-}
      # reverse proxy 越し前提なので x-forwarded-for 信用. 直公開に切り替えるなら 0 にする
      TRUST_PROXY: ${TRUST_PROXY:-1}
      # avatar fetchで許可するhost. 空ならcode側のdefault (discord CDN) が効く.
      # 増やすときは「全部書く」スタイル pyon: cdn.discordapp.com,media.discordapp.net,other.example
      PYON_AVATAR_ALLOWED_HOSTS: ${PYON_AVATAR_ALLOWED_HOSTS:-}
      # render の同時実行 cap. 越えたら 503 (queueはしない). mecha スペックに合わせて調整 pyon
      PYON_MAX_CONCURRENT: ${PYON_MAX_CONCURRENT:-4}
      # 1 request の全体 timeout. 越えたら 504. 普通は 1s 以下で終わる
      PYON_REQ_TIMEOUT_MS: ${PYON_REQ_TIMEOUT_MS:-15000}
    # blast radius 縮める hardening pyon. アプリは fs write 一切しない (no disk writes ever)
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
